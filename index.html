<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Gateway</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { text-align: center; padding: 30px; border: 1px solid #333; border-radius: 12px; background: #1e1e1e; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { padding: 12px; width: 100px; text-align: center; font-size: 20px; border-radius: 6px; border: 1px solid #555; background: #2a2a2a; color: white; letter-spacing: 5px; }
        button { padding: 12px 24px; font-size: 16px; margin-top: 15px; border: none; border-radius: 6px; background: #007bff; color: white; cursor: pointer; display: block; width: 100%; }
        button:hover { background: #0056b3; }
        #error { color: #ff4d4d; margin-top: 15px; font-size: 14px; display: none; }
    </style>
</head>
<body>

<div class="box">
    <h3 style="margin-bottom: 20px;">Masukkan 4 Digit Kode Akses</h3>
    <input type="password" id="pin" maxlength="4" placeholder="••••">
    <button onclick="checkPIN()">Buka Akses</button>
    <p id="error">Kode salah. Akses ditolak.</p>
</div>

<script>
function checkPIN() {
    const inputPIN = document.getElementById("pin").value;
    const errorMsg = document.getElementById("error");
    
    // GANTI "1234" dengan 4 digit angka rahasiamu (misal: "2509")
    // GANTI tautan di bawah dengan Link YouTube Unlisted milikmu
    if (inputPIN === "0902") {
        window.location.href = "https://youtu.be/dC7dicAhxu4?si=8ml9bTcBNL410LtZ";
    } else {
        errorMsg.style.display = "block";
    }
}
</script>

</body>
</html>
